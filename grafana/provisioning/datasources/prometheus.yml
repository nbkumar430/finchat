apiVersion: 1
datasources:
  # Enforces uid=prometheus for dashboard JSON compatibility.
  # Local Prometheus sidecar started by entrypoint.sh (scrapes FinChat /metrics).
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://127.0.0.1:9090
    isDefault: true
    editable: true
