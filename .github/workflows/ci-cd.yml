name: CI/CD – Lint, Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# New pushes supersede older runs (faster feedback on rapid commits).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: project-ede0958a-eb5c-4225-94d
  REGION: us-central1
  AR_REPO: finchat-repo
  APP_IMAGE: finchat-app
  GRAFANA_IMAGE: finchat-grafana
  APP_SERVICE: finchat-app
  GRAFANA_SERVICE: finchat-grafana
  APP_RUNTIME_SA: finchat-app-sa@project-ede0958a-eb5c-4225-94d.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.8.6
      - name: Run linter
        run: ruff check app/ tests/
      - name: Check formatting
        run: ruff format --check app/ tests/

  # ── Test (runs in parallel with lint → shorter wall-clock before deploy) ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ── Build & Deploy (only on main) ──────────────────────────────────
  build-deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build and push app image (registry cache → faster rebuilds when deps unchanged)
      - name: Build app image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          REG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}"
          CACHED="${REG}/${{ env.APP_IMAGE }}:latest"
          docker pull "${CACHED}" || true
          docker build \
            --cache-from "${CACHED}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "${REG}/${{ env.APP_IMAGE }}:${{ github.sha }}" .
          docker tag "${REG}/${{ env.APP_IMAGE }}:${{ github.sha }}" "${CACHED}"

      - name: Push app image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:latest

      # Build and push Grafana image
      - name: Build Grafana image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          REG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}"
          CACHED="${REG}/${{ env.GRAFANA_IMAGE }}:latest"
          docker pull "${CACHED}" || true
          docker build \
            --cache-from "${CACHED}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "${REG}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }}" \
            -f grafana/Dockerfile grafana/
          docker tag "${REG}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }}" "${CACHED}"

      - name: Push Grafana image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:latest

      # Deploy app to Cloud Run (service 1)
      - name: Deploy app to Cloud Run
        id: deploy_app
        run: |
          # --update-env-vars merges: keeps OPEN_ROUTER_API_KEY etc. if you set them in the console.
          gcloud run deploy ${{ env.APP_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --cpu-boost \
            --min-instances 0 \
            --max-instances 5 \
            --service-account ${{ env.APP_RUNTIME_SA }} \
            --update-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},LOG_LEVEL=INFO,USE_VERTEX_AI=false,VERTEX_FALLBACK_TO_API_KEY=false,SUMMARIZATION_PROVIDER=openrouter,OPENROUTER_MODEL=google/gemini-3-flash-preview"
          APP_URL=$(gcloud run services describe ${{ env.APP_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Verify app deployment before Grafana
        run: |
          set -euo pipefail
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          echo "App deployed at: ${APP_URL}"
          curl -fsSL "${APP_URL}/health" > /tmp/app-health-pre-grafana.json
          curl -fsSL "${APP_URL}/openapi.json" > /tmp/openapi-pre-grafana.json

      # Deploy Grafana to Cloud Run (prototype: admin / admin — no Secret Manager required)
      - name: Deploy Grafana to Cloud Run
        id: deploy_grafana
        continue-on-error: true
        run: |
          set -euo pipefail
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }}"

          # Plaintext prototype credentials (change before any non-demo deployment).
          gcloud run deploy ${{ env.GRAFANA_SERVICE }} \
            --image "$IMG" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 1Gi \
            --cpu 1 \
            --cpu-boost \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 2 \
            --service-account ${{ env.APP_RUNTIME_SA }} \
            --set-env-vars "FINCHAT_APP_BASE_URL=${APP_URL},GF_SECURITY_ADMIN_USER=admin,GF_SECURITY_ADMIN_PASSWORD=admin"

          GRAFANA_URL=$(gcloud run services describe ${{ env.GRAFANA_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "grafana_url=${GRAFANA_URL}" >> "$GITHUB_OUTPUT"

      - name: Pin Grafana ROOT_URL + wire FinChat observability env
        if: steps.deploy_grafana.outcome == 'success'
        run: |
          set -euo pipefail
          GRAFANA_URL=$(gcloud run services describe ${{ env.GRAFANA_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          gcloud run services update ${{ env.GRAFANA_SERVICE }} \
            --region ${{ env.REGION }} \
            --update-env-vars "GF_SERVER_ROOT_URL=${GRAFANA_URL},FINCHAT_APP_BASE_URL=${APP_URL}"
          gcloud run services update ${{ env.APP_SERVICE }} \
            --region ${{ env.REGION }} \
            --update-env-vars "GRAFANA_PUBLIC_URL=${GRAFANA_URL},FINCHAT_APP_PUBLIC_URL=${APP_URL}"

      - name: Report Grafana deploy outcome
        if: always()
        run: |
          if [[ "${{ steps.deploy_grafana.outcome }}" != "success" ]]; then
            echo "Grafana deployment did not succeed; app deployment remains available."
          fi

      - name: Print service URLs
        id: urls
        run: |
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          GRAFANA_URL="${{ steps.deploy_grafana.outputs.grafana_url }}"
          if [[ -z "${GRAFANA_URL}" ]]; then
            GRAFANA_URL="unavailable"
          fi

          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"
          echo "grafana_url=${GRAFANA_URL}" >> "$GITHUB_OUTPUT"

          echo "=== Deployment Complete ==="
          echo "App URL:"
          echo "${APP_URL}"
          echo "Grafana URL:"
          echo "${GRAFANA_URL}"
          echo "Swagger UI: ${APP_URL}/docs"

      - name: Smoke test deployed endpoints
        id: smoke
        run: |
          set -euo pipefail
          APP_URL="${{ steps.urls.outputs.app_url }}"
          GRAFANA_URL="${{ steps.urls.outputs.grafana_url }}"

          echo "Checking app health endpoint..."
          curl --retry 4 --retry-delay 3 --retry-all-errors -fsSL "${APP_URL}/health" > /tmp/app-health.json
          echo "Checking Swagger OpenAPI endpoint..."
          curl --retry 2 --retry-delay 2 --retry-all-errors -fsSL "${APP_URL}/openapi.json" > /tmp/openapi.json
          if [[ "${GRAFANA_URL}" != "unavailable" ]]; then
            echo "Checking Grafana root..."
            if ! curl --retry 3 --retry-delay 5 --retry-all-errors -fsSLI "${GRAFANA_URL}" > /tmp/grafana-head.txt; then
              echo "::warning::Grafana HEAD check failed after retries (cold start or service error); app deploy is still OK."
            fi
          else
            echo "Skipping Grafana smoke check because URL is unavailable."
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Create deployment summary artifact
        run: |
          APP_URL="${{ steps.urls.outputs.app_url }}"
          GRAFANA_URL="${{ steps.urls.outputs.grafana_url }}"
          SMOKE_STATUS="${{ steps.smoke.outputs.status }}"
          python3 << 'PYEOF'
          import json
          import os
          from datetime import datetime, timezone

          app_url = os.environ["APP_URL"]
          grafana_url = os.environ["GRAFANA_URL"]
          smoke_status = os.environ.get("SMOKE_STATUS", "unknown")
          payload = {
              "service": "finchat",
              "environment": "prod",
              "deployed_at_utc": datetime.now(timezone.utc).isoformat(),
              "project_id": "project-ede0958a-eb5c-4225-94d",
              "region": "us-central1",
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "urls": {
                  "app": app_url,
                  "swagger": f"{app_url}/docs",
                  "redoc": f"{app_url}/redoc",
                  "openapi": f"{app_url}/openapi.json",
                  "grafana": grafana_url,
              },
              "smoke_test": {
                  "status": smoke_status,
                  "checks": [
                      f"GET {app_url}/health",
                      f"GET {app_url}/openapi.json",
                      f"HEAD {grafana_url}",
                  ],
              },
          }
          with open("/tmp/deployment-summary.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
          print("Wrote /tmp/deployment-summary.json")
          PYEOF
        env:
          APP_URL: ${{ steps.urls.outputs.app_url }}
          GRAFANA_URL: ${{ steps.urls.outputs.grafana_url }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.status }}

      - name: Upload deployment summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary-${{ github.sha }}
          path: /tmp/deployment-summary.json
          retention-days: 30

      - name: Publish deployment summary
        run: |
          APP_URL="${{ steps.urls.outputs.app_url }}"
          GRAFANA_URL="${{ steps.urls.outputs.grafana_url }}"
          {
            echo "## FinChat Deployment Summary"
            echo ""
            echo "- **App URL:** ${APP_URL}"
            echo "- **Swagger UI:** ${APP_URL}/docs"
            echo "- **ReDoc:** ${APP_URL}/redoc"
            echo "- **Grafana URL:** ${GRAFANA_URL}"
            echo ""
            echo "### Smoke Test"
            echo "- App health: \`GET ${APP_URL}/health\`"
            echo "- OpenAPI: \`GET ${APP_URL}/openapi.json\`"
            echo "- Grafana: \`HEAD ${GRAFANA_URL}\`"
            echo ""
            echo "### Build Info"
            echo "- Commit SHA: \`${GITHUB_SHA}\`"
            echo "- Region: \`${{ env.REGION }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
