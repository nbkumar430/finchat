name: CI/CD – Lint, Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: project-ede0958a-eb5c-4225-94d
  REGION: us-central1
  AR_REPO: finchat-repo
  APP_IMAGE: finchat-app
  GRAFANA_IMAGE: finchat-grafana
  APP_SERVICE: finchat-app
  GRAFANA_SERVICE: finchat-grafana
  APP_RUNTIME_SA: finchat-app-sa@project-ede0958a-eb5c-4225-94d.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.8.6
      - name: Run linter
        run: ruff check app/ tests/
      - name: Check formatting
        run: ruff format --check app/ tests/

  # ── Test ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ── Build & Deploy (only on main) ──────────────────────────────────
  build-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build and push app image
      - name: Build app image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:${{ github.sha }} \
                     ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:latest

      - name: Push app image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:latest

      # Build and push Grafana image
      - name: Build Grafana image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }} \
                       -f grafana/Dockerfile grafana/
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }} \
                     ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:latest

      - name: Push Grafana image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:latest

      # Deploy app to Cloud Run (service 1)
      - name: Deploy app to Cloud Run
        id: deploy_app
        run: |
          gcloud run deploy ${{ env.APP_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.APP_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --service-account ${{ env.APP_RUNTIME_SA }} \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},LOG_LEVEL=INFO" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"
          APP_URL=$(gcloud run services describe ${{ env.APP_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Verify app deployment before Grafana
        run: |
          set -euo pipefail
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          echo "App deployed at: ${APP_URL}"
          curl -fsSL "${APP_URL}/health" > /tmp/app-health-pre-grafana.json
          curl -fsSL "${APP_URL}/openapi.json" > /tmp/openapi-pre-grafana.json

      # Deploy Grafana to Cloud Run (service 2 only after app success)
      - name: Deploy Grafana to Cloud Run
        id: deploy_grafana
        run: |
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          if gcloud secrets describe GRAFANA_ADMIN_PASSWORD >/dev/null 2>&1; then
            echo "Using Secret Manager for Grafana admin password."
            gcloud run deploy ${{ env.GRAFANA_SERVICE }} \
              --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }} \
              --region ${{ env.REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --port 3000 \
              --memory 256Mi \
              --cpu 1 \
              --min-instances 0 \
              --max-instances 2 \
              --service-account ${{ env.APP_RUNTIME_SA }} \
              --set-env-vars "PROMETHEUS_URL=${APP_URL}/metrics" \
              --set-secrets "GF_SECURITY_ADMIN_PASSWORD=GRAFANA_ADMIN_PASSWORD:latest"
          else
            echo "Secret GRAFANA_ADMIN_PASSWORD not found; using GitHub secret fallback."
            gcloud run deploy ${{ env.GRAFANA_SERVICE }} \
              --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.GRAFANA_IMAGE }}:${{ github.sha }} \
              --region ${{ env.REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --port 3000 \
              --memory 256Mi \
              --cpu 1 \
              --min-instances 0 \
              --max-instances 2 \
              --service-account ${{ env.APP_RUNTIME_SA }} \
              --set-env-vars "PROMETHEUS_URL=${APP_URL}/metrics,GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          fi
          GRAFANA_URL=$(gcloud run services describe ${{ env.GRAFANA_SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "grafana_url=${GRAFANA_URL}" >> "$GITHUB_OUTPUT"

      - name: Print service URLs
        id: urls
        run: |
          APP_URL="${{ steps.deploy_app.outputs.app_url }}"
          GRAFANA_URL="${{ steps.deploy_grafana.outputs.grafana_url }}"

          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"
          echo "grafana_url=${GRAFANA_URL}" >> "$GITHUB_OUTPUT"

          echo "=== Deployment Complete ==="
          echo "App URL:"
          echo "${APP_URL}"
          echo "Grafana URL:"
          echo "${GRAFANA_URL}"
          echo "Swagger UI: ${APP_URL}/docs"

      - name: Smoke test deployed endpoints
        id: smoke
        run: |
          set -euo pipefail
          APP_URL="${{ steps.urls.outputs.app_url }}"
          GRAFANA_URL="${{ steps.urls.outputs.grafana_url }}"

          echo "Checking app health endpoint..."
          curl -fsSL "${APP_URL}/health" > /tmp/app-health.json
          echo "Checking Swagger OpenAPI endpoint..."
          curl -fsSL "${APP_URL}/openapi.json" > /tmp/openapi.json
          echo "Checking Grafana root..."
          curl -fsSLI "${GRAFANA_URL}" > /tmp/grafana-head.txt
          echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Create deployment summary artifact
        run: |
          APP_URL="${{ steps.urls.outputs.app_url }}"
          GRAFANA_URL="${{ steps.urls.outputs.grafana_url }}"
          SMOKE_STATUS="${{ steps.smoke.outputs.status }}"
          python3 << 'PYEOF'
          import json
          import os
          from datetime import datetime, timezone

          app_url = os.environ["APP_URL"]
          grafana_url = os.environ["GRAFANA_URL"]
          smoke_status = os.environ.get("SMOKE_STATUS", "unknown")
          payload = {
              "service": "finchat",
              "environment": "prod",
              "deployed_at_utc": datetime.now(timezone.utc).isoformat(),
              "project_id": "project-ede0958a-eb5c-4225-94d",
              "region": "us-central1",
              "commit_sha": os.environ.get("GITHUB_SHA", ""),
              "urls": {
                  "app": app_url,
                  "swagger": f"{app_url}/docs",
                  "redoc": f"{app_url}/redoc",
                  "openapi": f"{app_url}/openapi.json",
                  "grafana": grafana_url,
              },
              "smoke_test": {
                  "status": smoke_status,
                  "checks": [
                      f"GET {app_url}/health",
                      f"GET {app_url}/openapi.json",
                      f"HEAD {grafana_url}",
                  ],
              },
          }
          with open("/tmp/deployment-summary.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
          print("Wrote /tmp/deployment-summary.json")
          PYEOF
        env:
          APP_URL: ${{ steps.urls.outputs.app_url }}
          GRAFANA_URL: ${{ steps.urls.outputs.grafana_url }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.status }}

      - name: Upload deployment summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary-${{ github.sha }}
          path: /tmp/deployment-summary.json
          retention-days: 30

      - name: Publish deployment summary
        run: |
          APP_URL="${{ steps.urls.outputs.app_url }}"
          GRAFANA_URL="${{ steps.urls.outputs.grafana_url }}"
          {
            echo "## FinChat Deployment Summary"
            echo ""
            echo "- **App URL:** ${APP_URL}"
            echo "- **Swagger UI:** ${APP_URL}/docs"
            echo "- **ReDoc:** ${APP_URL}/redoc"
            echo "- **Grafana URL:** ${GRAFANA_URL}"
            echo ""
            echo "### Smoke Test"
            echo "- App health: \`GET ${APP_URL}/health\`"
            echo "- OpenAPI: \`GET ${APP_URL}/openapi.json\`"
            echo "- Grafana: \`HEAD ${GRAFANA_URL}\`"
            echo ""
            echo "### Build Info"
            echo "- Commit SHA: \`${GITHUB_SHA}\`"
            echo "- Region: \`${{ env.REGION }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
